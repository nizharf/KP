<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Login — Inventory QR</title>

  <script type="module" src="http://[::1]:5173/@vite/client"></script><link rel="stylesheet" href="http://[::1]:5173/resources/css/app.css" /><script type="module" src="http://[::1]:5173/resources/js/app.js"></script></head>

<body class="min-h-screen bg-gray-50 flex items-center justify-center">

  <div class="w-full max-w-md px-4">
    <!-- Alert Success Popup -->

<!-- Alert Error Popup -->

<div class="max-w-md mx-auto">
  <div class="rounded-xl border bg-white p-6 shadow-sm border-l-4 border-l-blue-600">
    <!-- User Badge -->
    <div class="flex items-center justify-center mb-4">
      <div class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full">
        USER PORTAL
      </div>
    </div>

    <h4 class="text-xl font-semibold text-center mb-1">Login Pengguna</h4>
    <p class="text-sm text-gray-500 mb-4 text-center">Login untuk mengakses sistem inventaris</p>

    <form method="POST" action="http://127.0.0.1:8000/login" class="space-y-3">
      <input type="hidden" name="_token" value="v5X9L1tUJiCWkk493sBZ9ySL00KzFUqJweoGxSYI" autocomplete="off">
      <div>
        <label class="text-sm font-medium">Email</label>
        <input type="email" name="email" value="" required
               class="w-full rounded-lg border px-3 py-2 focus:ring-2 focus:ring-blue-500  border-gray-300 ">
      </div>

      <div>
        <label class="text-sm font-medium">Password</label>
        <div class="relative">
          <input type="password" id="passwordInput" name="password" required
                 class="w-full rounded-lg border px-3 py-2 pr-10 focus:ring-2 focus:ring-blue-500  border-gray-300 ">
          <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-700 focus:outline-none">
            <!-- Eye Icon (Show) -->
            <svg id="eyeIcon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20">
              <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
              <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" />
            </svg>
            <!-- Eye Slash Icon (Hide) -->
            <svg id="eyeSlashIcon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd" />
              <path d="M15.171 13.576l1.474 1.474a1 1 0 001.414-1.414l-14-14a1 1 0 00-1.414 1.414l1.474 1.474A10.014 10.014 0 0.458 10c1.274 4.057 5.064 7 9.542 7 2.169 0 4.25-.501 6.063-1.386l1.627 1.627a1 1 0 001.414-1.414l-1.474-1.474z" />
            </svg>
          </button>
        </div>
      </div>

      <script>
        function togglePasswordVisibility() {
          const passwordInput = document.getElementById('passwordInput');
          const eyeIcon = document.getElementById('eyeIcon');
          const eyeSlashIcon = document.getElementById('eyeSlashIcon');
          
          if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('hidden');
            eyeSlashIcon.classList.add('hidden');
          } else {
            passwordInput.type = 'password';
            eyeIcon.classList.add('hidden');
            eyeSlashIcon.classList.remove('hidden');
          }
        }
      </script>

      <div class="flex items-center justify-between">
        <label class="text-sm text-gray-600 flex items-center gap-2">
          <input type="checkbox" name="remember" value="1" class="rounded">
          Remember me
        </label>
      </div>

      <button class="w-full px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-500 font-medium">
        Login User
      </button>
    </form>

    <!-- Switch to admin login -->
    <div class="mt-4 pt-4 border-t border-gray-200 text-center">
      <p class="text-sm text-gray-600 mb-2">Adalah admin?</p>
      <a href="http://127.0.0.1:8000/admin/login" class="text-sm text-red-600 hover:text-red-700 font-medium">
        Login sebagai Admin
      </a>
    </div>
  </div>
</div>
  </div>

</body>
</html>
